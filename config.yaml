# ===========================================
# Network Proxy 配置文件
# ===========================================
# 修改配置后需要重启服务才能生效
# 重启服务: net stop NetworkProxy && net start NetworkProxy
# 或通过 services.msc 重启
# ===========================================

# 是否输出运行日志到 service.log 文件 (true/false)
# 默认 false，不产生日志文件。调试时建议设为 true
log_enabled: false

# HTTP 代理配置
http:
  # 是否启用HTTP代理 (true/false)
  enabled: true

  # HTTP代理监听端口
  # 默认 8080，可修改为其他端口
  port: 8080

  # 用户名 (留空表示不需要认证)
  # 示例: username: "admin"
  username: ""

  # 密码 (留空表示不需要认证)
  # 示例: password: "mypassword"
  password: ""

# SOCKS5 代理配置
socks5:
  # 是否启用SOCKS5代理 (true/false)
  enabled: true

  # SOCKS5代理监听端口
  # 默认 1080，可修改为其他端口
  port: 1080

  # 用户名 (留空表示不需要认证)
  # 示例: username: "admin"
  username: ""

  # 密码 (留空表示不需要认证)
  # 示例: password: "mypassword"
  password: ""